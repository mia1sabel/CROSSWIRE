<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CROSSWIRE | Lines Blurred</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@100..700&family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init({
            publicKey: "T03MF8lsTk9YmAljW",
          });
       })();
    </script>
</head>
<body>
    <header>
        <div class="logo">CROSSWIRE</div>
        <nav>
            <a href="#about">ABOUT</a>
            <a href="#lineup">LINEUP</a>
            <a href="#tickets">TICKETS</a>
            <a href="#partners">PARTNERS</a>
        </nav>
        <button class="ticket-btn" onclick="document.getElementById('portal').scrollIntoView({behavior: 'smooth'})">GET TICKETS</button>
    </header>

    <main>
        <section id="roster" class="roster-section">
            <h2>2026 ROSTER</h2>
            <div class="roster-box">
                <h3>CURRENTLY UNDER WRAPS</h3>
                <p>Our 2026 artist roster is highly guarded. Join the inner circle to find out when the first wave drops.</p>
                <form class="waitlist-form" onsubmit="window.handleWaitlistSubmit(event)">
                    <input type="email" placeholder="ENTER YOUR EMAIL" required>
                    <button type="submit">Join Inner Circle</button>
                </form>
            </div>
        </section>

        <section id="portal" class="portal-section">
            <h2>APPLICATION PORTAL</h2>
            <div class="portal-box">
                <form class="application-form" onsubmit="window.handlePortalSubmit(event)">
                    <div class="form-group">
                        <label for="portal_type">SELECT PORTAL TYPE</label>
                        <select name="portal_type" id="portal_type" required>
                            <option value="artist">ARTIST/PERFORMER SUBMISSION</option>
                            <option value="vendor">VENDOR APPLICATION</option>
                            <option value="press">PRESS/MEDIA CREDENTIALS</option>
                            <option value="sponsor">SPONSORSHIP INQUIRY</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="name">FULL NAME / COMPANY</label>
                        <input type="text" name="name" id="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">EMAIL ADDRESS</label>
                        <input type="email" name="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">CONCEPT DETAILS / LINKS</label>
                        <textarea name="message" id="message" rows="5" required></textarea>
                    </div>
                    <button type="submit">Submit Application</button>
                </form>
            </div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
